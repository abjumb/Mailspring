name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            dbus-x11 \
            libgbm1 \
            libnss3 \
            libasound2 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgtk-3-0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint:check

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run tests
        # --no-sandbox is required for Chromium/Electron on Linux CI runners where
        # the kernel sandbox (userns) is restricted. MOROS_SPEC_TIMEOUT controls
        # the in-process watchdog (minutes); kept below the step timeout so the
        # watchdog emits a labelled diagnostic before GH Actions kills the job.
        # 10 min gives the (previously-never-completing) suite room to finish on
        # the first green run; tighten once its real runtime is known.
        env:
          MOROS_SPEC_TIMEOUT: '10'
        run: dbus-launch --exit-with-session xvfb-run -a npm test -- --no-sandbox
        timeout-minutes: 13
